version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # tornado and msgpack are transitive dependencies of mitmproxy, which caps
    # them (tornado<=6.5.5, msgpack<=1.1.2). The lock already sits at those
    # ceilings, so independent Dependabot bumps only produce unmergeable PRs
    # (pip --require-hashes ResolutionImpossible). They move when mitmproxy is
    # bumped and the lock is regenerated via scripts/update-lock-files.sh.
    # cryptography is likewise capped by mitmproxy (<=48.1), so major bumps
    # to 49+ are unmergeable; within-range patch bumps are still allowed.
    # The remaining entries are other mitmproxy-capped deps sitting at their
    # ceilings (typing-extensions<=4.14, urwid<=3.0.5, aioquic==1.2.0,
    # pydivert<=2.1.0) and pyopenssl, whose 26.3+ releases require
    # cryptography>=49. Revisit ALL of these when mitmproxy is bumped.
    ignore:
      - dependency-name: "tornado"
      - dependency-name: "msgpack"
      - dependency-name: "cryptography"
        versions: [">=49"]
      - dependency-name: "typing-extensions"
        versions: [">4.14"]
      - dependency-name: "urwid"
        versions: [">3.0.5"]
      - dependency-name: "aioquic"
        versions: [">1.2.0"]
      - dependency-name: "pydivert"
        versions: [">2.1.0"]
      - dependency-name: "pyopenssl"
        versions: [">=26.3"]

  - package-ecosystem: "pip"
    directory: "/proxy"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/native-proxy/action"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    # @actions/artifact 6.x is ESM-only and pulls in @azure/storage-common's
    # emscripten/WASM crc64 module, which does not survive ncc bundling
    # (uploads fail at runtime with "crc64_require is not a function").
    # 5.x is the newest line that bundles and runs; a bump past it requires
    # re-verifying `npm run build` + a runtime smoke test of dist/teardown.
    # This also covers Dependabot *security* updates, which run even without
    # an npm config section (that's how the broken 6.2.1 bump in PR #17
    # landed without dist/ being rebuilt).
    # @actions/cache 6.x has the same Azure crc64 bundling breakage; 5.x is
    # the newest line that loads under ncc.
    ignore:
      - dependency-name: "@actions/artifact"
        versions: [">=6"]
      - dependency-name: "@actions/cache"
        versions: [">=6"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/native-proxy/action"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/native-proxy/action-setup"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/native-proxy/action-teardown"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/container"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/proxy"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/runner"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
