name: "PipeWarden Demo: Native Mode"

on:
  push:
    paths:
      - 'demo-nodejs/**'
      - 'native-proxy/**'
      - 'proxy/**'
      - 'policy/**'
      - 'scripts/**'
      - '.github/workflows/demo-pipewarden-native.yml'
  pull_request:
    paths:
      - 'demo-nodejs/**'
      - 'native-proxy/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-transparent:
    name: "Native proxy (transparent + DNS)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: pipewarden-pip-${{ runner.os }}-mitmproxy

      - name: "PipeWarden: Start network monitoring"
        uses: ./native-proxy/action
        with:
          # No policy-file → auto-resolve .github/pipewarden/common + per-pipeline
          mode: monitor
          dns: 'true'
          transparent: 'true'

      - name: Install dependencies
        working-directory: demo-nodejs
        run: npm install

      - name: Run tests
        working-directory: demo-nodejs
        run: npm test

      - name: Build application
        working-directory: demo-nodejs
        run: npm run build

      - name: Test HTTPS connectivity
        run: curl -s https://httpbin.org/ip
