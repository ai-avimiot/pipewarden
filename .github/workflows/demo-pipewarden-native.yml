name: "PipeWarden Demo: Native Mode"

on:
  push:
    paths:
      - 'demo-nodejs/**'
      - 'native-proxy/**'
      - 'proxy/**'
      - 'policy/**'
      - 'scripts/**'
      - '.github/workflows/demo-pipewarden-native.yml'
  pull_request:
    paths:
      - 'demo-nodejs/**'
      - 'native-proxy/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-transparent:
    name: "Native proxy (transparent + DNS)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pipewarden-pip-${{ runner.os }}-mitmproxy

      - name: "PipeWarden: Start network monitoring"
        uses: ./native-proxy/action
        with:
          policy-file: demo-nodejs/network-policy.yml
          mode: monitor
          dns: 'true'
          transparent: 'true'

      - name: Install dependencies
        working-directory: demo-nodejs
        run: npm install

      - name: Run tests
        working-directory: demo-nodejs
        run: npm test

      - name: Build application
        working-directory: demo-nodejs
        run: npm run build

      - name: Test HTTPS connectivity
        run: curl -s https://httpbin.org/ip
