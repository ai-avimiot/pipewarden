name: Build and push PipeWarden container images

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      # PipeWarden main image (container/Dockerfile)
      - 'container/**'
      - 'scripts/**'
      - 'policy/**'
      - 'proxy/**'
      # PipeWarden proxy image (proxy/Dockerfile)
      - 'proxy/Dockerfile'
      - 'proxy/requirements.txt'
      - 'proxy/addon.py'
      - 'proxy/dns_server.py'
      - 'proxy/proxy-entrypoint.sh'
      # PipeWarden runner image (runner/Dockerfile)
      - 'runner/**'
      # Workflow itself
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # keyless cosign signing via OIDC
      attestations: write   # GitHub-native build provenance

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # nfw (orchestrator) image
      # ----------------------------------------------------------------
      - name: Docker meta for PipeWarden main image
        id: meta-pipewarden
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push PipeWarden main image
        id: build-pipewarden
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./container/Dockerfile
          push: true
          tags: ${{ steps.meta-pipewarden.outputs.tags }}
          labels: ${{ steps.meta-pipewarden.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Attest build provenance — pipewarden
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden
          subject-digest: ${{ steps.build-pipewarden.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM — pipewarden
        run: syft "${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden@${{ steps.build-pipewarden.outputs.digest }}" -o spdx-json=sbom-pipewarden.spdx.json

      - name: Attest SBOM — pipewarden
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden
          subject-digest: ${{ steps.build-pipewarden.outputs.digest }}
          sbom-path: sbom-pipewarden.spdx.json
          push-to-registry: true

      - name: Cosign sign — pipewarden
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden@${{ steps.build-pipewarden.outputs.digest }}"

      # ----------------------------------------------------------------
      # nfw-proxy image
      # ----------------------------------------------------------------
      - name: Docker meta for PipeWarden proxy image
        id: meta-pipewarden-proxy
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-proxy
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push PipeWarden proxy image
        id: build-pipewarden-proxy
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./proxy/Dockerfile
          push: true
          tags: ${{ steps.meta-pipewarden-proxy.outputs.tags }}
          labels: ${{ steps.meta-pipewarden-proxy.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Attest build provenance — pipewarden-proxy
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-proxy
          subject-digest: ${{ steps.build-pipewarden-proxy.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM — pipewarden-proxy
        run: syft "${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-proxy@${{ steps.build-pipewarden-proxy.outputs.digest }}" -o spdx-json=sbom-pipewarden-proxy.spdx.json

      - name: Attest SBOM — pipewarden-proxy
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-proxy
          subject-digest: ${{ steps.build-pipewarden-proxy.outputs.digest }}
          sbom-path: sbom-pipewarden-proxy.spdx.json
          push-to-registry: true

      - name: Cosign sign — pipewarden-proxy
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-proxy@${{ steps.build-pipewarden-proxy.outputs.digest }}"

      # ----------------------------------------------------------------
      # pipewarden-runner image
      # ----------------------------------------------------------------
      - name: Docker meta for PipeWarden runner image
        id: meta-pipewarden-runner
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-runner
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push PipeWarden runner image
        id: build-pipewarden-runner
        uses: docker/build-push-action@v7
        with:
          context: ./runner
          push: true
          tags: ${{ steps.meta-pipewarden-runner.outputs.tags }}
          labels: ${{ steps.meta-pipewarden-runner.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Attest build provenance — pipewarden-runner
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-runner
          subject-digest: ${{ steps.build-pipewarden-runner.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM — pipewarden-runner
        run: syft "${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-runner@${{ steps.build-pipewarden-runner.outputs.digest }}" -o spdx-json=sbom-pipewarden-runner.spdx.json

      - name: Attest SBOM — pipewarden-runner
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-runner
          subject-digest: ${{ steps.build-pipewarden-runner.outputs.digest }}
          sbom-path: sbom-pipewarden-runner.spdx.json
          push-to-registry: true

      - name: Cosign sign — pipewarden-runner
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ github.repository_owner }}/pipewarden-runner@${{ steps.build-pipewarden-runner.outputs.digest }}"
