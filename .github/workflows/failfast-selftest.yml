name: "TEMP fail-fast self-test"

# Throwaway: verifies that fail-fast cancels the run on the first blocked
# connection in enforce mode. Deleted before merge.

on:
  push:
    branches: ["feat/wildcard-hints-and-failfast"]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  failfast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "PipeWarden (enforce + fail-fast)"
        uses: ./native-proxy/action
        with:
          mode: enforce
          fail-fast: true
          github-token: ${{ github.token }}

      - name: "Trigger a blocked connection (example.com not in policy)"
        run: curl -sS --max-time 20 https://example.com || true

      - name: "Should not reach here (run should be cancelled)"
        run: |
          sleep 30
          echo "If you see this, fail-fast did NOT cancel the run."
          exit 1
