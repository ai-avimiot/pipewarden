name: "PipeWarden - Native Proxy"
description: "Set up native proxy firewall with automatic teardown via post-action. Teardown runs automatically at job end (even on failure) - no manual teardown step needed."

inputs:
  policy-file:
    description: "Path to a network policy YAML. Leave empty to auto-resolve: merge .github/pipewarden/common.network-policy.yml + .github/pipewarden/<workflow>.network-policy.yml, falling back to repo-root network-policy.yml, then discovery."
    required: false
    default: ""
  mode:
    description: "monitor (log only) or enforce (block unauthorized traffic)"
    required: false
    default: "enforce"
  proxy-port:
    description: "Port for mitmproxy to listen on"
    required: false
    default: "8080"
  dns:
    description: "Enable DNS interception (stops systemd-resolved, runs PipeWarden DNS server on 127.0.0.53:53)"
    required: false
    default: "true"
  transparent:
    description: "Enable iptables transparent proxy (true) or use env-var-only mode (false)"
    required: false
    default: "true"
  cache:
    description: "Cache the proxy engine's pip wheels across runs (saves ~10-20s of setup). Set to 'false' to disable."
    required: false
    default: "true"
  upload-artifact:
    description: "Upload the generated report (/tmp/report/) as a build artifact at teardown. Set to 'false' to skip."
    required: false
    default: "true"
  artifact-name:
    description: "Name of the uploaded report artifact"
    required: false
    default: "network-report"
  fail-fast:
    description: "Enforce mode only: cancel the whole workflow run on the first blocked connection (instead of failing at teardown). Requires github-token with actions:write."
    required: false
    default: "false"
  github-token:
    description: "Token used to cancel the run when fail-fast triggers (pass the job's github.token; needs permissions: actions: write). Only used when fail-fast is true."
    required: false
    default: ""

outputs:
  report-path:
    description: "Path to the generated report directory"
  blocked-count:
    description: "Number of blocked connections"
  status:
    description: "pass or fail (fail when mode is enforce and blocked connections > 0)"

runs:
  using: "node24"
  main: "dist/setup/index.js"
  post: "dist/teardown/index.js"
  post-if: "always()"
