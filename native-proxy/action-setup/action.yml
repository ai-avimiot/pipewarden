name: "PipeWarden - Native Proxy Setup"
description: "Set up native proxy firewall on the GitHub Actions runner using mitmproxy as a background process"

inputs:
  policy-file:
    description: "Path to a network policy YAML. Leave empty to auto-resolve: merge .github/pipewarden/common.network-policy.yml + .github/pipewarden/<workflow>.network-policy.yml, falling back to repo-root network-policy.yml, then discovery."
    required: false
    default: ""
  mode:
    description: "monitor (log only) or enforce (block unauthorized traffic)"
    required: false
    default: "enforce"
  proxy-port:
    description: "Port for mitmproxy to listen on"
    required: false
    default: "8080"
  dns:
    description: "Enable DNS interception (stops systemd-resolved, runs PipeWarden DNS server on 127.0.0.53:53)"
    required: false
    default: "true"
  transparent:
    description: "Enable iptables transparent proxy (true) or use env-var-only mode (false)"
    required: false
    default: "true"
  fail-fast:
    description: "Enforce mode only: cancel the whole workflow run on the first blocked connection. Requires github-token with actions:write."
    required: false
    default: "false"
  github-token:
    description: "Token used to cancel the run when fail-fast triggers (pass the job's github.token; needs permissions: actions: write)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Run native proxy setup
      shell: bash
      run: bash ${{ github.action_path }}/../setup.sh
      env:
        INPUT_POLICY_FILE: ${{ inputs.policy-file }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PROXY_PORT: ${{ inputs.proxy-port }}
        INPUT_DNS: ${{ inputs.dns }}
        INPUT_TRANSPARENT: ${{ inputs.transparent }}
        INPUT_FAIL_FAST: ${{ inputs.fail-fast }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_ACTION_PATH: ${{ github.action_path }}/..
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_REPOSITORY: ${{ github.repository }}
